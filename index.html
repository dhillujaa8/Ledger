<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ledger — Personal Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Tokens ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #0f0f0e;
  --bg2:      #161614;
  --bg3:      #1d1d1a;
  --border:   #2a2a26;
  --border2:  #363630;
  --text:     #f0ede6;
  --muted:    #6b6860;
  --muted2:   #8a8778;
  --gold:     #c9a84c;
  --gold-lt:  #e2c97e;
  --gold-dk:  #a07830;
  --green:    #4caf8a;
  --red:      #c9504c;
  --radius:   4px;
  --serif:    'Playfair Display', Georgia, serif;
  --sans:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
  --shadow:   0 2px 24px rgba(0,0,0,.4);
}

html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
body{min-height:100vh}

/* ── Grain overlay ──────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* ── Layout ─────────────────────────────────────────────── */
.app{max-width:1100px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}

/* ── Header ─────────────────────────────────────────────── */
header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:52px 0 36px;
  border-bottom:1px solid var(--border2);
  margin-bottom:40px;
}
.header-left{}
.wordmark{
  font-family:var(--serif);font-size:52px;font-weight:700;
  letter-spacing:-1px;line-height:1;
  background:linear-gradient(135deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.wordmark-sub{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);
  margin-top:4px;
}
.header-date{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  padding-bottom:4px;letter-spacing:.5px;
}

/* ── Summary Cards ──────────────────────────────────────── */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}

.card{
  background:var(--bg2);border:1px solid var(--border);
  padding:24px;border-radius:var(--radius);position:relative;overflow:hidden;
  transition:border-color .2s;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(201,168,76,.04) 0%,transparent 60%);
  pointer-events:none;
}
.card:hover{border-color:var(--border2)}
.card-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.card-value{
  font-family:var(--serif);font-size:32px;font-weight:600;line-height:1;
  letter-spacing:-0.5px;
}
.card-value.income{color:var(--green)}
.card-value.expense{color:var(--red)}
.card-value.balance{color:var(--gold-lt)}
.card-delta{font-size:11px;color:var(--muted);margin-top:6px;font-family:var(--mono)}
.card-icon{
  position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:36px;opacity:.08;
}

/* ── Two-col grid ───────────────────────────────────────── */
.main-grid{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}

/* ── Panel ──────────────────────────────────────────────── */
.panel{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border);
}
.panel-title{
  font-family:var(--serif);font-size:16px;font-weight:600;
  color:var(--text);
}
.panel-body{padding:22px}

/* ── Bar Chart ──────────────────────────────────────────── */
.chart-wrap{height:180px;position:relative}
.chart-bars{
  display:flex;align-items:flex-end;gap:8px;
  height:100%;padding-top:16px;
}
.bar-group{
  flex:1;display:flex;gap:3px;align-items:flex-end;position:relative;
  cursor:default;
}
.bar-group:hover .bar{opacity:1}
.bar{
  flex:1;border-radius:2px 2px 0 0;
  transition:height .6s cubic-bezier(.34,1.56,.64,1), opacity .15s;
  opacity:.8;position:relative;
}
.bar.income-bar{background:linear-gradient(to top,var(--green),#6bcfab)}
.bar.expense-bar{background:linear-gradient(to top,var(--red),#e07774)}
.bar-label{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;
}
.chart-legend{
  display:flex;gap:20px;margin-top:32px;padding-top:12px;
  border-top:1px solid var(--border);
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted2)}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* ── Category Bars ──────────────────────────────────────── */
.cat-list{display:flex;flex-direction:column;gap:14px}
.cat-item{}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-name{font-size:12px;color:var(--text);display:flex;align-items:center;gap:6px}
.cat-amount{font-family:var(--mono);font-size:12px;color:var(--muted2)}
.cat-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}

/* ── Add Transaction Form ───────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.form-control{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:var(--sans);font-size:13px;
  padding:9px 12px;border-radius:var(--radius);outline:none;
  transition:border-color .15s;
  width:100%;
}
.form-control:focus{border-color:var(--gold)}
.form-control::placeholder{color:var(--muted)}
.form-control option{background:var(--bg3)}

/* Type toggle */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.type-btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);
  font-family:var(--sans);font-size:12px;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;
  padding:9px;border-radius:var(--radius);cursor:pointer;
  transition:all .15s;text-align:center;
}
.type-btn.active-income{background:#4caf8a18;border-color:var(--green);color:var(--green)}
.type-btn.active-expense{background:#c9504c18;border-color:var(--red);color:var(--red)}
.type-btn:hover:not(.active-income):not(.active-expense){border-color:var(--border2);color:var(--text)}

.btn-submit{
  width:100%;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-dk) 100%);
  color:#0f0f0e;border:none;
  font-family:var(--serif);font-size:15px;font-weight:600;font-style:italic;
  padding:11px;border-radius:var(--radius);cursor:pointer;
  transition:opacity .15s,transform .1s;margin-top:4px;
  letter-spacing:.3px;
}
.btn-submit:hover{opacity:.9}
.btn-submit:active{transform:scale(.98)}

/* ── Transaction History ────────────────────────────────── */
.tx-list{display:flex;flex-direction:column}
.tx-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 22px;border-bottom:1px solid var(--border);
  transition:background .12s;animation:fadeRow .25s ease;
}
.tx-row:last-child{border-bottom:none}
.tx-row:hover{background:var(--bg3)}

@keyframes fadeRow{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.tx-icon{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.tx-body{flex:1;min-width:0}
.tx-desc{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cat{font-size:10px;color:var(--muted);margin-top:1px}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{
  font-family:var(--mono);font-size:14px;font-weight:500;
}
.tx-amount.income{color:var(--green)}
.tx-amount.expense{color:var(--red)}
.tx-date{font-size:10px;color:var(--muted);margin-top:1px;font-family:var(--mono)}
.tx-delete{
  background:none;border:none;color:var(--muted);font-size:13px;
  cursor:pointer;padding:4px 6px;border-radius:2px;
  opacity:0;transition:all .12s;flex-shrink:0;
}
.tx-row:hover .tx-delete{opacity:1}
.tx-delete:hover{color:var(--red);background:#c9504c18}

.tx-empty{
  padding:48px 22px;text-align:center;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);
}

/* ── Section divider ────────────────────────────────────── */
.section-divider{
  display:flex;align-items:center;gap:16px;
  margin:32px 0 20px;
}
.section-divider-line{flex:1;height:1px;background:var(--border)}
.section-divider-text{
  font-family:var(--serif);font-size:18px;font-style:italic;
  color:var(--gold);white-space:nowrap;
}

/* ── Toast ──────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:28px;right:28px;z-index:99;
  background:var(--bg3);border:1px solid var(--border2);
  border-left:3px solid var(--gold);color:var(--text);
  font-size:12px;padding:12px 18px;border-radius:var(--radius);
  opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;
  font-family:var(--mono);
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-left-color:var(--red)}

/* ── Responsive ─────────────────────────────────────────── */
@media(max-width:820px){
  .main-grid{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr 1fr 1fr}
}
@media(max-width:560px){
  .cards{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}

/* ── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="wordmark">Ledger</div>
      <div class="wordmark-sub">Personal Finance Dashboard</div>
    </div>
    <div class="header-date" id="header-date"></div>
  </header>

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Total Balance</div>
      <div class="card-value balance" id="card-balance">—</div>
      <div class="card-delta" id="card-balance-sub">income − expenses</div>
      <div class="card-icon">⚖</div>
    </div>
    <div class="card">
      <div class="card-label">Total Income</div>
      <div class="card-value income" id="card-income">—</div>
      <div class="card-delta">all time</div>
      <div class="card-icon">↑</div>
    </div>
    <div class="card">
      <div class="card-label">Total Expenses</div>
      <div class="card-value expense" id="card-expense">—</div>
      <div class="card-delta">all time</div>
      <div class="card-icon">↓</div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">

    <!-- Left column: chart + history -->
    <div>
      <!-- 6-month Chart -->
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-header">
          <span class="panel-title">6-Month Overview</span>
        </div>
        <div class="panel-body">
          <div class="chart-wrap">
            <div class="chart-bars" id="chart-bars">
              <!-- rendered by JS -->
            </div>
          </div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Income</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Expenses</div>
          </div>
        </div>
      </div>

      <!-- Transaction History -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Transaction History</span>
          <span id="tx-count" style="font-size:11px;color:var(--muted);font-family:var(--mono)"></span>
        </div>
        <div id="tx-list" class="tx-list">
          <div class="tx-empty">Loading transactions…</div>
        </div>
      </div>
    </div>

    <!-- Right column: form + categories -->
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- Add Transaction -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">New Transaction</span>
        </div>
        <div class="panel-body">
          <div class="form-grid">

            <div class="form-group full">
              <div class="form-label">Type</div>
              <div class="type-toggle">
                <button class="type-btn active-income" id="btn-income" onclick="setType('income')">▲ Income</button>
                <button class="type-btn" id="btn-expense" onclick="setType('expense')">▼ Expense</button>
              </div>
            </div>

            <div class="form-group full">
              <label class="form-label">Description</label>
              <input class="form-control" id="f-desc" type="text" placeholder="What was this for?"/>
            </div>

            <div class="form-group">
              <label class="form-label">Amount</label>
              <input class="form-control" id="f-amount" type="number" min="0.01" step="0.01" placeholder="0.00"/>
            </div>

            <div class="form-group">
              <label class="form-label">Date</label>
              <input class="form-control" id="f-date" type="date"/>
            </div>

            <div class="form-group full">
              <label class="form-label">Category</label>
              <select class="form-control" id="f-category">
                <option value="">Loading categories…</option>
              </select>
            </div>

            <div class="form-group full">
              <button class="btn-submit" onclick="submitTransaction()">Record Transaction</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Category Breakdown -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Category Breakdown</span>
        </div>
        <div class="panel-body">
          <div class="cat-list" id="cat-list">
            <div style="color:var(--muted);font-size:11px;text-align:center;padding:20px">Loading…</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ================================================================
//  Ledger Frontend — dual-mode (API server or in-memory shim)
// ================================================================

// ── In-memory shim ───────────────────────────────────────────
const MEM = (() => {
  const CATS = [
    {id:1,name:'Salary',       type:'income', icon:'💼',color:'#4CAF9A'},
    {id:2,name:'Freelance',    type:'income', icon:'🎨',color:'#6EC6A0'},
    {id:3,name:'Investments',  type:'income', icon:'📈',color:'#89D4AE'},
    {id:4,name:'Other Income', type:'income', icon:'💰',color:'#A8DFC0'},
    {id:5,name:'Housing',      type:'expense',icon:'🏠',color:'#C9A84C'},
    {id:6,name:'Food',         type:'expense',icon:'🍽',color:'#D4B86A'},
    {id:7,name:'Transport',    type:'expense',icon:'🚗',color:'#DCC88A'},
    {id:8,name:'Healthcare',   type:'expense',icon:'⚕️',color:'#E3D4A0'},
    {id:9,name:'Shopping',     type:'expense',icon:'🛍',color:'#C9A84C'},

    {id:12,name:'Education',   type:'expense',icon:'📚',color:'#AA821A'},
  ];

  const d = (n) => { const x=new Date(); x.setDate(x.getDate()-n); return x.toISOString().slice(0,10); };
  let txs = [
    {id:1,type:'income', amount:5200,description:'Monthly salary',    category_id:1,tx_date:d(2), category:'Salary',      category_icon:'💼',category_color:'#4CAF9A'},
    {id:2,type:'expense',amount:980, description:'Rent payment',      category_id:5,tx_date:d(3), category:'Housing',     category_icon:'🏠',category_color:'#C9A84C'},
    {id:3,type:'expense',amount:240, description:'Grocery run',       category_id:6,tx_date:d(4), category:'Food',        category_icon:'🍽',category_color:'#D4B86A'},
    {id:4,type:'income', amount:650, description:'UI design project',  category_id:2,tx_date:d(6), category:'Freelance',   category_icon:'🎨',category_color:'#6EC6A0'},
    {id:5,type:'expense',amount:134, description:'Electric & water',   category_id:11,tx_date:d(7),category:'Utilities',   category_icon:'⚡',category_color:'#B58E2A'},
    {id:6,type:'income', amount:5200,description:'Monthly salary',     category_id:1,tx_date:d(35),category:'Salary',      category_icon:'💼',category_color:'#4CAF9A'},
    {id:7,type:'expense',amount:980, description:'Rent payment',       category_id:5,tx_date:d(36),category:'Housing',     category_icon:'🏠',category_color:'#C9A84C'},
    {id:8,type:'income', amount:420, description:'Stock dividend',     category_id:3,tx_date:d(38),category:'Investments', category_icon:'📈',category_color:'#89D4AE'},

    {id:10,type:'expense',amount:195,description:'Online shopping',    category_id:9,tx_date:d(42),category:'Shopping',    category_icon:'🛍',category_color:'#C9A84C'},
    {id:11,type:'income', amount:5200,description:'Monthly salary',    category_id:1,tx_date:d(65),category:'Salary',      category_icon:'💼',category_color:'#4CAF9A'},
    {id:12,type:'expense',amount:980, description:'Rent payment',      category_id:5,tx_date:d(66),category:'Housing',     category_icon:'🏠',category_color:'#C9A84C'},

    {id:14,type:'expense',amount:450, description:'New clothes',       category_id:9,tx_date:d(70),category:'Shopping',    category_icon:'🛍',category_color:'#C9A84C'},
    {id:15,type:'income', amount:5200,description:'Monthly salary',    category_id:1,tx_date:d(95),category:'Salary',      category_icon:'💼',category_color:'#4CAF9A'},
    {id:16,type:'expense',amount:980, description:'Rent payment',      category_id:5,tx_date:d(96),category:'Housing',     category_icon:'🏠',category_color:'#C9A84C'},
    {id:17,type:'expense',amount:600, description:'Online courses',    category_id:12,tx_date:d(100),category:'Education', category_icon:'📚',category_color:'#AA821A'},
    {id:18,type:'income', amount:5200,description:'Monthly salary',    category_id:1,tx_date:d(125),category:'Salary',     category_icon:'💼',category_color:'#4CAF9A'},
    {id:19,type:'expense',amount:980, description:'Rent payment',      category_id:5,tx_date:d(126),category:'Housing',    category_icon:'🏠',category_color:'#C9A84C'},
    {id:20,type:'expense',amount:750, description:'Car repair',        category_id:7,tx_date:d(128),category:'Transport',  category_icon:'🚗',category_color:'#DCC88A'},
    {id:21,type:'income', amount:5200,description:'Monthly salary',    category_id:1,tx_date:d(155),category:'Salary',     category_icon:'💼',category_color:'#4CAF9A'},
    {id:22,type:'expense',amount:980, description:'Rent payment',      category_id:5,tx_date:d(156),category:'Housing',    category_icon:'🏠',category_color:'#C9A84C'},
    {id:23,type:'income', amount:500, description:'Side project',      category_id:2,tx_date:d(158),category:'Freelance',  category_icon:'🎨',category_color:'#6EC6A0'},
    {id:24,type:'expense',amount:320, description:'Concert tickets',   category_id:10,tx_date:d(160),category:'Entertainment',category_icon:'🎭',category_color:'#BF9B3A'},
  ];
  let nid = 25;

  const catById = id => CATS.find(c=>c.id===parseInt(id));

  const summary = () => {
    const totalIncome  = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const totalExpense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const catMap = {};
    txs.forEach(t=>{
      const key=t.category+'|'+t.type;
      if(!catMap[key]) catMap[key]={name:t.category,icon:t.category_icon,color:t.category_color,type:t.type,total:0};
      catMap[key].total+=t.amount;
    });
    const categories=Object.values(catMap).sort((a,b)=>b.total-a.total);

    // Build 6 months
    const monthMap={};
    for(let i=5;i>=0;i--){
      const dt=new Date(); dt.setDate(1); dt.setMonth(dt.getMonth()-i);
      const key=dt.toISOString().slice(0,7);
      const label=dt.toLocaleString('default',{month:'short'});
      monthMap[key]={month:label+' '+dt.getFullYear().toString().slice(2),income:0,expense:0};
    }
    txs.forEach(t=>{
      const key=t.tx_date.slice(0,7);
      if(monthMap[key]){
        if(t.type==='income') monthMap[key].income+=t.amount;
        else monthMap[key].expense+=t.amount;
      }
    });

    return {
      balances:{total_income:totalIncome,total_expense:totalExpense},
      categories,
      monthly:Object.values(monthMap),
    };
  };

  return {
    categories:()=>({ok:true,data:CATS}),
    summary:()=>({ok:true,data:summary()}),
    list:()=>({ok:true,data:{items:[...txs].sort((a,b)=>b.tx_date.localeCompare(a.tx_date)||b.id-a.id),total:txs.length}}),
    create(body){
      const cat=catById(body.category_id);
      if(!cat) return {ok:false,error:'Category not found'};
      const t={id:nid++,...body,amount:Number(body.amount),
        category:cat.name,category_icon:cat.icon,category_color:cat.color};
      txs.unshift(t);
      return {ok:true,data:t};
    },
    delete(id){
      const idx=txs.findIndex(t=>t.id===id);
      if(idx===-1) return {ok:false,error:'Not found'};
      txs.splice(idx,1);
      return {ok:true,data:{id}};
    },
  };
})();

// ── API facade ───────────────────────────────────────────────
const IS_SERVER = window.location.protocol !== 'file:' && window.location.port === '3000';

const api = {
  async categories(){ if(!IS_SERVER) return MEM.categories(); return (await fetch('/api/categories')).json(); },
  async summary(){     if(!IS_SERVER) return MEM.summary();    return (await fetch('/api/summary')).json(); },
  async list(){        if(!IS_SERVER) return MEM.list();       return (await fetch('/api/transactions?limit=50')).json(); },
  async create(body){
    if(!IS_SERVER) return MEM.create(body);
    return (await fetch('/api/transactions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  },
  async del(id){
    if(!IS_SERVER) return MEM.delete(id);
    return (await fetch(`/api/transactions/${id}`,{method:'DELETE'})).json();
  },
};

// ── State ────────────────────────────────────────────────────
let currentType = 'income';

// ── Utilities ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n);
const fmtShort = n => n >= 1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+n.toFixed(0);

let toastTimer;
function toast(msg, isError=false){
  const el=$('toast');
  el.textContent=msg; el.className='toast show'+(isError?' error':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

function setType(type){
  currentType=type;
  $('btn-income').className ='type-btn'+(type==='income'?' active-income':'');
  $('btn-expense').className='type-btn'+(type==='expense'?' active-expense':'');
  populateCategories();
}

// ── Categories ───────────────────────────────────────────────
let allCats = [];
async function loadCategories(){
  const res = await api.categories();
  if(res.ok) allCats = res.data;
  populateCategories();
}

function populateCategories(){
  const sel = $('f-category');
  const filtered = allCats.filter(c=>c.type===currentType);
  sel.innerHTML = filtered.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

// ── Summary + Chart ──────────────────────────────────────────
async function loadSummary(){
  const res = await api.summary();
  if(!res.ok) return;
  const {balances,categories,monthly} = res.data;

  // Cards
  const inc = parseFloat(balances.total_income||0);
  const exp = parseFloat(balances.total_expense||0);
  $('card-income').textContent  = fmt(inc);
  $('card-expense').textContent = fmt(exp);
  $('card-balance').textContent = fmt(inc - exp);

  // Chart
  renderChart(monthly||[]);

  // Category bars
  renderCategories(categories||[]);
}

function renderChart(monthly){
  const wrap = $('chart-bars');
  if(!monthly.length){ wrap.innerHTML='<div style="color:var(--muted);font-size:11px;margin:auto">No data</div>'; return; }

  const maxVal = Math.max(...monthly.flatMap(m=>[m.income||0,m.expense||0]),1);

  wrap.innerHTML = monthly.map(m=>{
    const inc = ((m.income||0)/maxVal*100).toFixed(1);
    const exp = ((m.expense||0)/maxVal*100).toFixed(1);
    const lbl = (m.month||'').replace(' ','<br>');
    return `
      <div class="bar-group">
        <div class="bar income-bar"  style="height:${inc}%" title="Income: ${fmt(m.income||0)}"></div>
        <div class="bar expense-bar" style="height:${exp}%" title="Expense: ${fmt(m.expense||0)}"></div>
        <div class="bar-label">${lbl}</div>
      </div>`;
  }).join('');
}

function renderCategories(cats){
  const el = $('cat-list');
  if(!cats.length){ el.innerHTML='<div style="color:var(--muted);font-size:11px;text-align:center;padding:16px">No data yet</div>'; return; }

  const maxAmt = Math.max(...cats.map(c=>parseFloat(c.total)||0),1);
  el.innerHTML = cats.slice(0,8).map(c=>{
    const pct = ((parseFloat(c.total)||0)/maxAmt*100).toFixed(1);
    const color = c.type==='income' ? 'var(--green)' : (c.color||'var(--gold)');
    return `
      <div class="cat-item">
        <div class="cat-header">
          <span class="cat-name">${c.icon||'●'} ${c.name}</span>
          <span class="cat-amount">${fmt(parseFloat(c.total)||0)}</span>
        </div>
        <div class="cat-bar-bg">
          <div class="cat-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
  }).join('');
}

// ── Transactions ─────────────────────────────────────────────
async function loadTransactions(){
  const res = await api.list();
  if(!res.ok) return;
  const items = res.data.items || res.data || [];
  $('tx-count').textContent = `${items.length} records`;

  if(!items.length){
    $('tx-list').innerHTML='<div class="tx-empty">No transactions yet.</div>';
    return;
  }

  $('tx-list').innerHTML = items.map(t=>{
    const sign = t.type==='income' ? '+' : '−';
    const cls  = t.type;
    const date = new Date(t.tx_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const bg   = t.type==='income' ? '#4caf8a18' : '#c9504c18';
    return `
      <div class="tx-row" data-id="${t.id}">
        <div class="tx-icon" style="background:${bg};color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.category_icon||'●'}</div>
        <div class="tx-body">
          <div class="tx-desc">${escHtml(t.description)}</div>
          <div class="tx-cat">${t.category||''}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amount ${cls}">${sign} ${fmt(parseFloat(t.amount))}</div>
          <div class="tx-date">${date}</div>
        </div>
        <button class="tx-delete" onclick="deleteTransaction(${t.id})" title="Delete">✕</button>
      </div>`;
  }).join('');
}

async function deleteTransaction(id){
  const row = document.querySelector(`[data-id="${id}"]`);
  if(row){ row.style.opacity='0'; row.style.transform='translateX(12px)'; row.style.transition='all .2s'; }
  setTimeout(async ()=>{
    const res = await api.del(id);
    if(res.ok){ refresh(); toast('Transaction removed'); }
    else toast(res.error||'Error', true);
  }, 180);
}

// ── Submit ───────────────────────────────────────────────────
async function submitTransaction(){
  const desc   = $('f-desc').value.trim();
  const amount = parseFloat($('f-amount').value);
  const date   = $('f-date').value;
  const catId  = $('f-category').value;

  if(!desc)   { $('f-desc').focus();   toast('Description required', true); return; }
  if(!amount||amount<=0){ $('f-amount').focus(); toast('Enter a valid amount', true); return; }
  if(!date)   { $('f-date').focus();   toast('Date required', true); return; }
  if(!catId)  { toast('Select a category', true); return; }

  const res = await api.create({type:currentType,amount,description:desc,category_id:parseInt(catId),tx_date:date});
  if(res.ok){
    $('f-desc').value='';
    $('f-amount').value='';
    refresh();
    toast(`${currentType==='income'?'▲ Income':'▼ Expense'} recorded`);
  } else {
    toast(res.error||'Error saving transaction', true);
  }
}

// ── Helpers ──────────────────────────────────────────────────
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function refresh(){
  await Promise.all([loadSummary(), loadTransactions()]);
}

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async ()=>{
  // Set today's date
  const now = new Date();
  $('header-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  $('f-date').value = now.toISOString().slice(0,10);

  await loadCategories();
  await refresh();
});
</script>
</body>
